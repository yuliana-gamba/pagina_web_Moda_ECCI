<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossary - Moda ECCI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Moda ECCI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="experiencia.html">Mi Experiencia</a></li>
                    <li class="nav-item"><a class="nav-link active" href="glosario.html">Glossary</a></li>
                    <li class="nav-item"><a class="nav-link" href="sostenibilidad.html">Sostenibilidad</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5 flex-grow-1 bg-light">
        <div class="container">
            <h2 class="text-center mb-5">Glossary <h2>
            <div class="accordion shadow-sm" id="accordionGlossary"></div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">© 2026 Evento Moda ECCI - SENA.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
    
    <script>
        const terms = [
            {en: "Cloud Computing", es: "Computación en la nube", def: "Servicios y recursos ofrecidos por internet."},
            {en: "Color theory", es: "Teoría del color", def: "Estudio de cómo los colores generan percepción visual."},
            {en: "Pantone", es: "Pantone", def: "Sistema estandarizado de identificación del color."},
            {en: "User Experience (UX)", es: "Experiencia de Usuario", def: "Cómo interactúa y qué siente un usuario al usar un sistema."},
            {en: "User Interface (UI)", es: "Interfaz de Usuario", def: "Elementos visuales con los que el usuario interactúa."},
            {en: "Frontend", es: "Desarrollo del lado del cliente", def: "Parte del software que interactúa directamente con el usuario."},
            {en: "Semiology", es: "Semiología", def: "Estudio de los signos y su significado en la comunicación visual."},
            {en: "Responsive Design", es: "Diseño adaptativo", def: "Técnica para que la web se adapte a cualquier tamaño de pantalla."},
            {en: "Grid System", es: "Sistema de cuadrícula", def: "Estructura que permite organizar el contenido de forma alineada."},
            {en: "Accessibility", es: "Accesibilidad", def: "Prácticas para que la web sea usable por personas con discapacidades."},
            {en: "Usability", es: "Usabilidad", def: "Facilidad con la que las personas pueden utilizar una herramienta particular."},
            {en: "Circular Economy", es: "Economía circular", def: "Modelo de producción enfocado en reutilizar y reciclar materiales."},
            {en: "Sustainability", es: "Sostenibilidad", def: "Satisfacer necesidades actuales sin comprometer recursos futuros."},
            {en: "Wireframe", es: "Esquema de página", def: "Guía visual básica que representa la estructura de una web."},
            {en: "Mockup", es: "Maqueta visual", def: "Representación estática del diseño final de un producto digital."}
        ];

        const container = document.getElementById('accordionGlossary');
        let htmlContent = '';
        terms.forEach((term, index) => {
            htmlContent += `
                <div class="accordion-item">
                    <h2 class="accordion-header" id="heading${index}">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}">
                            <strong>${term.en}</strong> &nbsp; - ${term.es}
                        </button>
                    </h2>
                    <div id="collapse${index}" class="accordion-collapse collapse" data-bs-parent="#accordionGlossary">
                        <div class="accordion-body">
                            <em>Definición:</em> ${term.def}
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = htmlContent;
    </script>
</body>
</html>
